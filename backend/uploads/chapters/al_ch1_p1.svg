<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" width="100%" height="100%">
      <defs>
        <linearGradient id="grad_al_ch1_p1" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1e140a"/>
          <stop offset="100%" stop-color="#100b05"/>
        </linearGradient>
        <filter id="shadow">
          <feDropShadow dx="3" dy="5" stdDeviation="4" flood-opacity="0.3"/>
        </filter>
        <filter id="bubbleShadow">
