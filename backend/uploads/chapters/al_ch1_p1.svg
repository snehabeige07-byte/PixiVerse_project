      <g filter="url(#shadow)">
        <rect x="30" y="340" width="540" height="260" rx="8" fill="#000000" opacity="0.6" stroke="#f59e0b" stroke-width="2"/>
        <g stroke="#f59e0b" stroke-width="1" opacity="0.3">
