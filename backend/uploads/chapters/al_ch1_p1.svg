          <text x="105" y="32" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#000000">Aurelia: The secret archive...</text>
          <text x="105" y="48" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#000000">Locked for a hundred years.</text>
        </g>
